<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        .message { margin-bottom: 16px; display: flex; gap: 10px; }
        .message.user { justify-content: flex-end; }
        .message.user .content { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 16px 16px 4px 16px; }
        .message.ai .content { background: white; border-radius: 16px 16px 16px 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .message .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .message.user .avatar { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .message.ai .avatar { background: #e9ecef; color: #667eea; }
        .message .content { max-width: 70%; padding: 10px 14px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .input-area { padding: 16px 20px; background: white; border-top: 1px solid #e9ecef; display: flex; gap: 10px; }
        .input-area textarea { flex: 1; padding: 12px 14px; border: 2px solid #e9ecef; border-radius: 16px; font-size: 14px; resize: none; outline: none; min-height: 44px; }
        .send-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 12px 20px; border-radius: 16px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .status-bar { background: #e9ecef; padding: 6px 16px; font-size: 12px; color: #666; text-align: center; }
        .status-bar.online { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>AI Agent</h1></div>
        <div class="status-bar" id="statusBar">Connecting...</div>
        <div class="chat-area" id="chatArea">
            <div class="message ai">
                <div class="avatar">AI</div>
                <div class="content">Hello! I am your AI Assistant. Configure your API Key to start.</div>
            </div>
        </div>
        <div class="input-area">
            <textarea id="msgInput" placeholder="Type message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
            <button class="send-btn" onclick="send()">Send</button>
        </div>
    </div>
    <script>
        let ws = null;
        function init() {
            ws = new WebSocket(`ws://${location.host}/api/chat/stream`);
            ws.onopen = () => { document.getElementById('statusBar').className='status-bar online'; document.getElementById('statusBar').textContent='Connected'; };
            ws.onmessage = (e) => { const d = JSON.parse(e.data); if(d.type==='chunk') updateLast(d.data); else if(d.type==='complete') document.getElementById('statusBar').textContent='Connected'; };
            ws.onclose = () => { document.getElementById('statusBar').textContent='Disconnected'; };
        }
        function send() {
            const input = document.getElementById('msgInput');
            const msg = input.value.trim();
            if(!msg) return;
            input.value = '';
            append('user', msg);
            append('ai', '');
            if(ws && ws.readyState===1) ws.send(JSON.stringify({message: msg}));
        }
        function append(role, content) {
            const chat = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="avatar">${role==='user'?'U':'AI'}</div><div class="content">${content}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
        function updateLast(content) {
            const msgs = document.querySelectorAll('.message.ai');
            if(msgs.length) msgs[msgs.length-1].querySelector('.content').textContent += content;
        }
        init();
    </script>
</body>
</html>
